<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Akan Name Generator</title>
        <link rel="stylesheet"href="styles.css">
    </head>
    <body>

        <div class="container">
            <h1>Akan Name Generator</h1>
            <p class="intro">
                Ever wondered what your Akan name would be?Enter your birth 
                details below and find out.
            </p>
            <form id="akanForm">

                <div class="form-group">
                    <label for="day">Day of Birth</label>
                    <input type="number"id="day"placeholder="e.g. 15 required">
                </div>

                <div class="form-group">
                    <label for="month">Month</label>
                    <input type="number"id="month"placeholder="e.g. 8"required>
                </div>

                <div class="form-group">
                    <label for="year">Year</label>
                    <input type="number"id="year"pklaceholder="e.g.2004" required>
                </div>
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender"required>
                        <option value=>--Select Gender--</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                
                <button>type="submit"Get My Akan Name</button>
            </form>

            <p id="result"class="result"></p>
        </div>

        
    </body>
</html>
